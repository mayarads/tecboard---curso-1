<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Tecboard App - monitore suas aplicações em tempo real, para que elas nunca saiam do ar sem você saber.">
    <meta name="og:title" content="Tecboard App">
    <meta name="og:description" content="Monitore suas aplicações em tempo real, para que elas nunca saiam do ar sem você saber">
    <meta name="og:image" content="https://mayarads.github.io/tecboard---curso-1/img/celulares-sobrepostos-desktop.png">
    <meta name="og:type" content="website">
    <meta name="og:url" content="https://mayarads.github.io/tecboard---curso-1/">

    <link rel="icon" href="favicon-tecboard.ico" type="image/svg+xml">
    <link rel="stylesheet" href="css/style.css">
   

    <title>Tecboard - Monitoramento em tempo real</title>

    <meta name="google-site-verification" content="l6b2Xrz8Msjmq6fhsFF73R9MUesSQRO27vsXycOZXrg" />
</head>
<body>
    <header>
        <img src="img/logo-tecboard-branco.png" alt="Logo do Tecboard App na cor branca">
    </header>
    <button id="theme-toggle" title="Alternar tema" aria-pressed="false">Modo claro</button>
    <main>
        <section>
            <h1><span>Fique de olho</span><br> no que importa</h1>
            
            <p>Monitoramento em tempo real com alertas inteligentes para sua aplicação nunca sair do ar sem você saber.</p>
            <a class="fixed-cta" href="#" title="Teste a versão demo do App Tecboard">Testar versão demo</a>
            <img src="img/celulares-sobrepostos-desktop.png" alt="Tela do App Tecboard em dois celulares pretos sobrepostos, com destaque para o hub de eventos de tecnologia.">
        </section>
    </main>
    <script>
        (function(){
            const btn = document.getElementById('theme-toggle');
            if(!btn) return;
            const saved = localStorage.getItem('theme') || 'dark';
            function applyTheme(theme){
                if(theme === 'light'){
                    document.body.classList.add('light-theme');
                    btn.textContent = 'Modo escuro';
                    btn.setAttribute('aria-pressed','true');
                } else {
                    document.body.classList.remove('light-theme');
                    btn.textContent = 'Modo claro';
                    btn.setAttribute('aria-pressed','false');
                }
                localStorage.setItem('theme', theme);
            }
            applyTheme(saved);
            btn.addEventListener('click', function(){
                const next = document.body.classList.contains('light-theme') ? 'dark' : 'light';
                applyTheme(next);
            });
        })();
    </script>
</body>
</html>
