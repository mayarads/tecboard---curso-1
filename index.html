<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Tecboard App - monitore suas aplicações em tempo real, para que elas nunca saiam do ar sem você saber.">
    <meta name="og:title" content="Tecboard App">
    <meta name="og:description" content="Monitore suas aplicações em tempo real, para que elas nunca saiam do ar sem você saber">
    <meta name="og:image" content="https://mayarads.github.io/tecboard---curso-1/img/celulares-sobrepostos-desktop.png">
    <meta name="og:type" content="website">
    <meta name="og:url" content="https://mayarads.github.io/tecboard---curso-1/">

    <link rel="icon" href="favicon-tecboard.ico" type="image/svg+xml">
    <link rel="stylesheet" href="./css/style.css">
   

    <title>Tecboard - Monitoramento em tempo real</title>

    <meta name="google-site-verification" content="l6b2Xrz8Msjmq6fhsFF73R9MUesSQRO27vsXycOZXrg" />
</head>
<body>
    <header>
        <img src="img/logo-tecboard-branco.png" alt="Logo do Tecboard App na cor branca">
    </header>
    <button id="theme-toggle" title="Alternar tema" aria-pressed="false">
        <span class="theme-icon" aria-hidden="true">🌙</span>
        <span class="theme-label">Modo claro</span>
    </button>
    <main>
        <section>
            <h1><span>Fique de olho</span><br> no que importa</h1>
            
            <p>Monitoramento em tempo real com alertas inteligentes para sua aplicação nunca sair do ar sem você saber.</p>
            <a class="fixed-cta" href="#" title="Teste a versão demo do App Tecboard">Testar versão demo</a>
            <img src="img/celulares-sobrepostos-desktop.png" alt="Tela do App Tecboard em dois celulares pretos sobrepostos, com destaque para o hub de eventos de tecnologia.">
        </section>
    </main>
    <script>
        (function(){
            const btn = document.getElementById('theme-toggle');
            const logo = document.querySelector('header img');
            if(!btn) return;
            const icon = btn.querySelector('.theme-icon');
            const label = btn.querySelector('.theme-label');
            const saved = localStorage.getItem('theme') || 'dark';

            const SVG_SUN = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M12 4V2M12 22v-2M4 12H2M22 12h-2M5 5L3.5 3.5M20.5 20.5L19 19M19 5l1.5-1.5M4.5 19.5L6 18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.5"/></svg>';
            const SVG_MOON = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';

            function applyTheme(theme){
                    if(theme === 'light'){
                        document.body.classList.add('light-theme');
                        if(icon) icon.innerHTML = SVG_MOON;
                        btn.setAttribute('aria-pressed','true');
                        btn.setAttribute('aria-label','Modo escuro');
                        if(logo) {
                            logo.src = 'img/logo-tecboard-preto.png';
                            logo.alt = 'Logo do Tecboard App na cor preta';
                        }
                    } else {
                        document.body.classList.remove('light-theme');
                        if(icon) icon.innerHTML = SVG_SUN;
                        btn.setAttribute('aria-pressed','false');
                        btn.setAttribute('aria-label','Modo claro');
                        if(logo) {
                            logo.src = 'img/logo-tecboard-branco.png';
                            logo.alt = 'Logo do Tecboard App na cor branca';
                        }
                    }
                localStorage.setItem('theme', theme);
            }

            applyTheme(saved);
            btn.addEventListener('click', function(){
                const next = document.body.classList.contains('light-theme') ? 'dark' : 'light';
                applyTheme(next);
            });
        })();
    </script>
</body>
</html>
